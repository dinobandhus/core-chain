<!DOCTYPE html>
<html>
<head>
  <title>Tata Service</title>
  </head>
  <body>

  <button onclick="addNetwork()">Add Tata Network</button>
<button onclick="connectWallet()">Connect Wallet</button>
<p><b>Address:</b> <span id="address">Not connected</span></p>
<p><b>Balance:</b> <span id="balance">0</span></p>
<script src="network.js"></script>
<script src="connect.js"></script>
<script src="app.js"></script>
<script src="./connect.js"></script>
<script src="./app.js"></script>
  <script>
  async function addNetwork() {
    await window.ethereum.request({
        method: 'wallet_addEthereumChain',
            params: [{
                  chainId: '0xA29',
                        chainName: 'Tata Service',
                              nativeCurrency: {
                                      name: 'Tata Service',
                                              symbol: 'TATA',
                                                      decimals: 18
                                                            },
                                                                  rpcUrls: ['http://16.171.110.210:8545']
                                                                      }]
                                                                        });
                                                                        }
                                                                        </script>

                                                                        </body>
                                                                        </html>
